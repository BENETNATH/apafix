## APAFIX - Configuration nginx
## Copier dans /etc/nginx/sites-available/apafix
## puis: ln -s /etc/nginx/sites-available/apafix /etc/nginx/sites-enabled/
##       nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name apafix.example.com;  # Modifier avec votre domaine

    # Redirection HTTP -> HTTPS (décommenter si certificat SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;  # Pour l'upload de gros XML

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /static/ {
        alias /opt/apafix/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

