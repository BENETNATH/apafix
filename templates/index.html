{% extends "base.html" %}

{% block title %}Accueil{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-light rounded-3">
    <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Bienvenue sur APAFIS Editor</h1>
        <p class="col-md-8 fs-4">Gérez, éditez et convertissez vos fichiers de saisine APAFIS simplement.</p>
        {% if not current_user.is_authenticated %}
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg">Commencer</a>
        {% else %}
        <a href="{{ url_for('list_daps') }}" class="btn btn-success btn-lg">Voir mes Saisines</a>
        {% endif %}
    </div>
</div>
{% endblock %}
